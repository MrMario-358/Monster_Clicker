name: Build APK
 
on:
  push:
    branches:
      - main
 
jobs:
  build:
    runs-on: ubuntu-22.04
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
 
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev \
            libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev \
            unzip zip autoconf automake libtool \
            libltdl-dev pkg-config cmake m4
 
      - name: Install Python deps
        run: |
          pip install "cython<3.0" buildozer
 
      - name: Build APK (first run to let Buildozer download SDK)
        run: |
          buildozer android debug 2>&1 | head -200 || true
 
      - name: Accept Buildozer Android SDK licenses
        run: |
          SDKMANAGER="$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses || true
            yes | "$SDKMANAGER" "build-tools;34.0.0" "platforms;android-33" || true
          else
            echo "sdkmanager not found at $SDKMANAGER"
            find $HOME/.buildozer -name "sdkmanager" 2>/dev/null
          fi
 
      - name: Build APK (final)
        run: |
          buildozer android debug
 
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: underwaterclicker-apk
          path: bin/*.apk